<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwordsBattle.io | Sprite Visible</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #menu {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: white;
        }
        .menu-box { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #444; width: 280px; text-align: center; }
        input, select, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #00e676; font-weight: bold; cursor: pointer; color: #000; }

        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.7); padding: 12px; border-radius: 12px; 
            pointer-events: none; z-index: 1000; display: none;
        }

        .touch-ctrl {
            position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.15); 
            border: 2px solid rgba(255, 255, 255, 0.3); display: none; z-index: 1500;
        }
        #joystick-base { bottom: 60px; left: 60px; width: 120px; height: 120px; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.6; pointer-events: none; }
        #dash-btn { bottom: 180px; right: 60px; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #atk-btn { bottom: 50px; right: 50px; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; background: rgba(255, 0, 0, 0.4); }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-box">
            <h1 style="color:#00e676">SWORDS BATTLE</h1>
            <input type="text" id="username" placeholder="Name..." maxlength="10">
            <select id="worldSelect">
                <option value="grass">Grassy Plains</option>
                <option value="lava">Volcanic Ember</option>
                <option value="ocean">Deep Ocean</option>
            </select>
            <button id="startBtn">START GAME</button>
        </div>
    </div>

    <div id="ui">
        <h2 id="ui-name" style="margin:0; font-size: 16px;">Player</h2>
        <div id="score">Kills: 0</div>
    </div>

    <div id="joystick-base" class="touch-ctrl"><div id="joystick-stick"></div></div>
    <div id="dash-btn" class="touch-ctrl">DASH</div>
    <div id="atk-btn" class="touch-ctrl">SWING</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const uiLayer = document.getElementById('ui');
        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        let gameActive = false;
        let kills = 0;
        let isTouch = false;
        const keys = {};
        const mouse = { x: 0, y: 0 };
        const joyState = { x: 0, y: 0, active: false, id: null };

        const WORLD_SIZE = 4000;
        const camera = { x: 0, y: 0 };
        const bushes = [];
        let bots = [];

        const themes = {
            grass: { bg: '#2e7d32', alt: '#388e3c', bush: 'rgba(13, 71, 16, 0.6)' },
            lava: { bg: '#bf360c', alt: '#d84315', bush: 'rgba(46, 26, 20, 0.7)' },
            ocean: { bg: '#01579b', alt: '#0277bd', bush: 'rgba(0, 40, 50, 0.5)' }
        };
        let currentTheme = themes.grass;

        const player = {
            x: WORLD_SIZE/2, y: WORLD_SIZE/2,
            radius: 30, hp: 100, maxHp: 100,
            color: '#2196f3', name: "Player",
            speed: 7, angle: 0,
            isAttacking: false, swingAngle: 0,
            dashTimer: 0, dashCooldown: 0,
            vx: 0, vy: 0, isHidden: false, isPlayer: true
        };

        document.getElementById('startBtn').onclick = () => {
            player.name = document.getElementById('username').value || "Player";
            document.getElementById('ui-name').innerText = player.name;
            currentTheme = themes[document.getElementById('worldSelect').value];
            
            camera.x = player.x - w / 2;
            camera.y = player.y - h / 2;

            bushes.length = 0;
            for(let i=0; i<40; i++) bushes.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, size: 160 });
            
            bots = [];
            for(let i=0; i<12; i++) {
                bots.push({
                    x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
                    radius: 30, hp: 100, maxHp: 100, color: '#f44336',
                    name: "Bot " + (i+1), speed: 3.5, angle: Math.random()*Math.PI*2,
                    isAttacking: false, swingAngle: 0, vx: 0, vy: 0, isHidden: false, isPlayer: false
                });
            }

            menu.style.display = 'none';
            uiLayer.style.display = 'block';
            document.querySelectorAll('.touch-ctrl').forEach(el => el.style.display = 'flex');
            gameActive = true;
        };

        // --- Input Events ---
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        
        joyBase.addEventListener('touchstart', (e) => {
            isTouch = true; joyState.active = true;
            joyState.id = e.targetTouches[0].identifier;
            e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (!joyState.active) return;
            let touch = Array.from(e.changedTouches).find(t => t.identifier === joyState.id);
            if(!touch) return;
            const rect = joyBase.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(50, Math.hypot(dx, dy));
            const angle = Math.atan2(dy, dx);
            joyState.x = (Math.cos(angle) * dist) / 50;
            joyState.y = (Math.sin(angle) * dist) / 50;
            joyStick.style.transform = `translate(${joyState.x * 50}px, ${joyState.y * 50}px)`;
            e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchend', () => { joyState.active = false; joyState.x = 0; joyState.y = 0; joyStick.style.transform = 'none'; });
        document.getElementById('atk-btn').ontouchstart = (e) => { e.preventDefault(); triggerAttack(player); };
        document.getElementById('dash-btn').ontouchstart = (e) => { e.preventDefault(); triggerDash(player); };

        function triggerAttack(e) { if (!e.isAttacking) { e.isAttacking = true; e.swingAngle = -1.2; } }
        function triggerDash(e) { if (e.dashCooldown <= 0) { e.dashTimer = 15; e.dashCooldown = 60; } }

        function drawEntity(e) {
            ctx.save();
            // Critical fix: Translate to camera-relative position
            ctx.translate(e.x - camera.x, e.y - camera.y);
            
            ctx.globalAlpha = e.isHidden ? 0.3 : 1.0;

            // Name & Health
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
            ctx.fillText(e.name, 0, -60);
            ctx.fillStyle = '#111'; ctx.fillRect(-30, -50, 60, 8);
            ctx.fillStyle = e.isPlayer ? '#00e676' : '#ff1744';
            ctx.fillRect(-30, -50, 60 * (e.hp/e.maxHp), 8);

            // Body
            ctx.rotate(e.angle);
            
            // Sword
            ctx.save();
            if (e.isAttacking) { ctx.rotate(e.swingAngle); e.swingAngle += 0.35; if(e.swingAngle > 1.2) e.isAttacking = false; }
            ctx.fillStyle = '#eee'; ctx.fillRect(30, -5, 50, 10); // Sword Blade
            ctx.fillStyle = '#555'; ctx.fillRect(30, -15, 8, 30); // Crossguard
            ctx.restore();

            // Circle Sprite
            ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI * 2);
            ctx.fillStyle = e.color || '#2196f3'; ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.stroke();
            
            ctx.restore();
            ctx.globalAlpha = 1.0;
        }

        function update() {
            if(!gameActive) return;

            let s = player.dashTimer > 0 ? 18 : player.speed;
            if (player.dashTimer > 0) player.dashTimer--;
            if (player.dashCooldown > 0) player.dashCooldown--;

            // Movement
            if (isTouch) {
                player.x += (joyState.x * s) + player.vx;
                player.y += (joyState.y * s) + player.vy;
                if(joyState.x !== 0 || joyState.y !== 0) player.angle = Math.atan2(joyState.y, joyState.x);
            } else {
                let mx = 0, my = 0;
                if (keys['KeyW']) my = -s; if (keys['KeyS']) my = s;
                if (keys['KeyA']) mx = -s; if (keys['KeyD']) mx = s;
                player.x += mx + player.vx; player.y += my + player.vy;
            }

            player.vx *= 0.8; player.vy *= 0.8;
            player.x = Math.max(0, Math.min(WORLD_SIZE, player.x));
            player.y = Math.max(0, Math.min(WORLD_SIZE, player.y));

            camera.x = player.x - w / 2;
            camera.y = player.y - h / 2;

            // Bots & Collision
            bots.forEach(bot => {
                const d = Math.hypot(player.x - bot.x, player.y - bot.y);
                if (d < 500) {
                    bot.angle = Math.atan2(player.y - bot.y, player.x - bot.x);
                    if (d < 100 && Math.random() < 0.05) triggerAttack(bot);
                }
                bot.x += Math.cos(bot.angle)*bot.speed + bot.vx;
                bot.y += Math.sin(bot.angle)*bot.speed + bot.vy;
                bot.vx *= 0.8; bot.vy *= 0.8;

                // Simple Hit Detection
                if (player.isAttacking && d < 120) { bot.hp -= 2; bot.vx += Math.cos(player.angle)*20; bot.vy += Math.sin(player.angle)*20; }
                if (bot.isAttacking && d < 120) { player.hp -= 1; player.vx += Math.cos(bot.angle)*15; player.vy += Math.sin(bot.angle)*15; }
                
                if (bot.hp <= 0) { bot.x = Math.random()*WORLD_SIZE; bot.y = Math.random()*WORLD_SIZE; bot.hp = 100; kills++; document.getElementById('score').innerText = "Kills: " + kills; }
            });

            if (player.hp <= 0) location.reload();
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, w, h);
            if(!gameActive) { requestAnimationFrame(draw); return; }
            update();

            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            
            // Map
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            ctx.fillStyle = currentTheme.alt;
            for(let x=0; x<WORLD_SIZE; x+=200) for(let y=0; y<WORLD_SIZE; y+=200) {
                if((x+y)%400==0) ctx.fillRect(x,y,100,100);
            }

            // Entities
            bots.forEach(drawEntity);
            drawEntity(player);

            // Bushes
            ctx.fillStyle = currentTheme.bush;
            bushes.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2, 0, Math.PI*2); ctx.fill(); });
            
            ctx.restore();
            requestAnimationFrame(draw);
        }

        window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        draw();
    </script>
</body>
</html>
